<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradCC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1116"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#edeef0" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#3fa7a0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3fa7a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlowCC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradCC)"/>

  <!-- large soft optical circle, off-center -->
  <circle cx="760" cy="315" r="260" fill="url(#lensGlow)"/>
  <circle cx="760" cy="315" r="185" fill="none" stroke="rgba(237,238,240,0.14)" stroke-width="1.5"/>
  <circle cx="760" cy="315" r="185" fill="none" stroke="rgba(63,167,160,0.35)" stroke-width="1" stroke-dasharray="2 6"/>

  <!-- overlay grid: real world vs traced line, camera lucida concept -->
  <g opacity="0.85">
    <path d="M640,230 Q700,190 780,220 Q850,245 830,320 Q815,390 740,400 Q660,410 640,340 Q625,280 640,230 Z"
          fill="none" stroke="#edeef0" stroke-width="1.4"/>
    <path d="M645,235 Q705,196 782,224 Q848,248 828,318 Q813,386 742,396 Q664,406 645,338 Q630,282 645,235 Z"
          fill="none" stroke="#3fa7a0" stroke-width="1.4" stroke-dasharray="3 5" filter="url(#softGlowCC)"/>
  </g>

  <!-- prism / mirror element referencing camera lucida instrument -->
  <g transform="translate(760,315)">
    <path d="M-18,-30 L18,-30 L0,10 Z" fill="none" stroke="#c9a15c" stroke-width="2" opacity="0.85"/>
    <line x1="0" y1="10" x2="0" y2="60" stroke="#c9a15c" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- crosshair / viewfinder ticks -->
  <g stroke="rgba(237,238,240,0.35)" stroke-width="1">
    <line x1="760" y1="90" x2="760" y2="120"/>
    <line x1="760" y1="510" x2="760" y2="540"/>
    <line x1="500" y1="315" x2="530" y2="315"/>
    <line x1="990" y1="315" x2="1020" y2="315"/>
  </g>

  <text x="110" y="230" font-family="'Unbounded', sans-serif" font-size="42" font-weight="700" fill="#edeef0">cámara</text>
  <text x="110" y="280" font-family="'Unbounded', sans-serif" font-size="42" font-weight="700" fill="#3fa7a0">clara</text>
  <text x="110" y="330" font-family="'Inter', sans-serif" font-size="15" fill="#939ba5" opacity="0.9">instrumento óptico digital</text>

  <text x="110" y="470" font-family="'JetBrains Mono', monospace" font-size="12" fill="#939ba5">"con la nitidez de lo que se mira dos veces"</text>
</svg>
