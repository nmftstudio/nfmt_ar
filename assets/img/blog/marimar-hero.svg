<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradMM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1116"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EF7D9B" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#EF7D9B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurMM" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGradMM)"/>
  <circle cx="180" cy="120" r="90" fill="url(#pinkGlow)" filter="url(#blurMM)"/>
  <circle cx="1040" cy="500" r="110" fill="url(#pinkGlow)" filter="url(#blurMM)"/>

  <!-- phone mockup showing catalog -->
  <rect x="120" y="105" width="290" height="430" rx="26" fill="#0d1116" stroke="rgba(237,238,240,0.14)" stroke-width="2"/>
  <rect x="140" y="145" width="250" height="350" rx="4" fill="#05070a"/>

  <text x="160" y="180" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#EF7D9B">MariMar</text>
  <text x="160" y="200" font-family="'Inter', sans-serif" font-size="11" fill="#939ba5">Costura Creativa</text>

  <!-- product grid -->
  <g>
    <rect x="160" y="220" width="98" height="98" rx="6" fill="#151016" stroke="rgba(239,125,155,0.3)"/>
    <path d="M175,300 q35,-55 68,0" fill="none" stroke="#EF7D9B" stroke-width="2" opacity="0.8"/>
    <rect x="272" y="220" width="98" height="98" rx="6" fill="#151016" stroke="rgba(239,125,155,0.3)"/>
    <circle cx="321" cy="269" r="26" fill="none" stroke="#c9a15c" stroke-width="2" opacity="0.8"/>
    <rect x="160" y="332" width="98" height="98" rx="6" fill="#151016" stroke="rgba(239,125,155,0.3)"/>
    <rect x="180" y="355" width="58" height="52" rx="4" fill="none" stroke="#3fa7a0" stroke-width="2" opacity="0.8"/>
    <rect x="272" y="332" width="98" height="98" rx="6" fill="#151016" stroke="rgba(239,125,155,0.3)"/>
    <path d="M290,405 l20,-45 20,45z" fill="none" stroke="#EF7D9B" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- cart chip -->
  <rect x="160" y="450" width="210" height="32" rx="16" fill="#1a1116" stroke="rgba(239,125,155,0.4)"/>
  <text x="180" y="471" font-family="'JetBrains Mono', monospace" font-size="12" fill="#EF7D9B">Ver carrito · WhatsApp</text>

  <!-- stitched thread line motif -->
  <path d="M480,140 Q560,80 640,140 T800,140 T960,140" fill="none" stroke="#EF7D9B" stroke-width="2" stroke-dasharray="10 8" opacity="0.55"/>
  <circle cx="480" cy="140" r="4" fill="#EF7D9B"/>
  <circle cx="960" cy="140" r="4" fill="#EF7D9B"/>

  <text x="480" y="230" font-family="'Unbounded', sans-serif" font-size="30" font-weight="700" fill="#edeef0">hecho a mano,</text>
  <text x="480" y="270" font-family="'Unbounded', sans-serif" font-size="30" font-weight="700" fill="#edeef0">puntada a puntada</text>
  <text x="480" y="310" font-family="'Inter', sans-serif" font-size="15" fill="#939ba5">Bordados · reutilizables · juegos de tela · accesorios</text>

  <!-- needle + thread icon -->
  <g transform="translate(480,360)" stroke="#c9a15c" stroke-width="2" fill="none">
    <line x1="0" y1="0" x2="90" y2="60" stroke-linecap="round"/>
    <ellipse cx="6" cy="4" rx="7" ry="4" transform="rotate(34 6 4)"/>
    <path d="M90,60 q30,10 20,45" stroke="#EF7D9B" opacity="0.7"/>
  </g>

  <text x="480" y="480" font-family="'JetBrains Mono', monospace" font-size="13" fill="#939ba5">Valle de Calamuchita, Córdoba</text>
</svg>
