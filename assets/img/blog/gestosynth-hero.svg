<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1116"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <radialGradient id="dustGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a15c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a15c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dustBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- warm dust motes -->
  <circle cx="180" cy="120" r="70" fill="url(#dustGlow)" filter="url(#dustBlur)"/>
  <circle cx="1040" cy="500" r="90" fill="url(#dustGlow)" filter="url(#dustBlur)"/>
  <circle cx="950" cy="90" r="50" fill="url(#dustGlow)" filter="url(#dustBlur)"/>

  <!-- panel base -->
  <rect x="90" y="90" width="1020" height="450" rx="6" fill="#0b0f13" stroke="rgba(237,238,240,0.10)"/>

  <!-- VFD readout -->
  <rect x="130" y="130" width="420" height="90" rx="3" fill="#05070a" stroke="rgba(201,161,92,0.35)"/>
  <text x="150" y="188" font-family="'JetBrains Mono', monospace" font-size="38" letter-spacing="4" fill="#c9a15c" filter="url(#softGlow)">GESTOSYNTH</text>

  <!-- rotary knobs -->
  <g stroke="rgba(201,161,92,0.5)" fill="none">
    <circle cx="640" cy="175" r="34" fill="#0d1116" stroke-width="2"/>
    <line x1="640" y1="175" x2="640" y2="148" stroke="#c9a15c" stroke-width="3" stroke-linecap="round"/>
    <circle cx="720" cy="175" r="34" fill="#0d1116" stroke-width="2"/>
    <line x1="720" y1="175" x2="742" y2="155" stroke="#c9a15c" stroke-width="3" stroke-linecap="round"/>
    <circle cx="800" cy="175" r="34" fill="#0d1116" stroke-width="2"/>
    <line x1="800" y1="175" x2="778" y2="195" stroke="#c9a15c" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- amber rocker switches -->
  <g>
    <rect x="870" y="150" width="34" height="52" rx="4" fill="#1a1408" stroke="rgba(201,161,92,0.4)"/>
    <rect x="874" y="156" width="26" height="18" rx="2" fill="#c9a15c" opacity="0.85" filter="url(#softGlow)"/>
    <rect x="915" y="150" width="34" height="52" rx="4" fill="#1a1408" stroke="rgba(201,161,92,0.4)"/>
    <rect x="919" y="180" width="26" height="18" rx="2" fill="#3a2f18"/>
    <rect x="960" y="150" width="34" height="52" rx="4" fill="#1a1408" stroke="rgba(201,161,92,0.4)"/>
    <rect x="964" y="156" width="26" height="18" rx="2" fill="#c9a15c" opacity="0.85" filter="url(#softGlow)"/>
  </g>

  <!-- chiclet piano strip -->
  <g>
    <rect x="130" y="440" width="860" height="60" rx="3" fill="#0d1116" stroke="rgba(237,238,240,0.10)"/>
    <g fill="#151a20" stroke="rgba(237,238,240,0.08)">
      <rect x="140" y="450" width="52" height="40" rx="2"/>
      <rect x="200" y="450" width="52" height="40" rx="2"/>
      <rect x="260" y="450" width="52" height="40" rx="2"/>
      <rect x="320" y="450" width="52" height="40" rx="2"/>
      <rect x="380" y="450" width="52" height="40" rx="2"/>
      <rect x="440" y="450" width="52" height="40" rx="2"/>
      <rect x="500" y="450" width="52" height="40" rx="2"/>
      <rect x="560" y="450" width="52" height="40" rx="2"/>
      <rect x="620" y="450" width="52" height="40" rx="2"/>
      <rect x="680" y="450" width="52" height="40" rx="2"/>
      <rect x="740" y="450" width="52" height="40" rx="2"/>
      <rect x="800" y="450" width="52" height="40" rx="2"/>
      <rect x="860" y="450" width="52" height="40" rx="2" fill="#ff4fa0" opacity="0.18"/>
    </g>
  </g>

  <!-- hand landmark tracking overlay -->
  <g stroke="#ff4fa0" stroke-width="2" fill="#ff4fa0" filter="url(#softGlow)">
    <!-- palm -->
    <circle cx="870" cy="300" r="4"/>
    <!-- fingers as simple joint chains -->
    <path d="M870,300 L845,255 L835,215 L828,185" fill="none" stroke-opacity="0.85"/>
    <circle cx="845" cy="255" r="3.5"/><circle cx="835" cy="215" r="3.5"/><circle cx="828" cy="185" r="3.5"/>

    <path d="M870,300 L880,240 L884,195 L887,160" fill="none" stroke-opacity="0.85"/>
    <circle cx="880" cy="240" r="3.5"/><circle cx="884" cy="195" r="3.5"/><circle cx="887" cy="160" r="3.5"/>

    <path d="M870,300 L915,250 L935,210 L950,180" fill="none" stroke-opacity="0.85"/>
    <circle cx="915" cy="250" r="3.5"/><circle cx="935" cy="210" r="3.5"/><circle cx="950" cy="180" r="3.5"/>

    <path d="M870,300 L940,270 L965,240 L982,215" fill="none" stroke-opacity="0.7"/>
    <circle cx="940" cy="270" r="3.5"/><circle cx="965" cy="240" r="3.5"/><circle cx="982" cy="215" r="3.5"/>

    <path d="M870,300 L835,320 L800,330 L775,335" fill="none" stroke-opacity="0.6"/>
    <circle cx="835" cy="320" r="3.5"/><circle cx="800" cy="330" r="3.5"/><circle cx="775" cy="335" r="3.5"/>
  </g>

  <!-- faint typography label -->
  <text x="130" y="580" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#939ba5">HAND + FACE TRACKING · WEB AUDIO</text>
</svg>
